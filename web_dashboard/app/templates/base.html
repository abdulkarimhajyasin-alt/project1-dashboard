<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "لوحة تحكم التعدين" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="admin-app mining-admin-app">
  <div class="mining-bg" aria-hidden="true"></div>
  <div class="admin-menu-backdrop" data-admin-menu-close aria-hidden="true"></div>
  <aside class="admin-mining-sidebar" id="adminMenu" data-admin-menu aria-hidden="true">
    <div class="admin-menu-header">
      <div class="mining-brand">
        <span class="brand-mark">AD</span>
        <div>
          <strong>Mining Admin</strong>
          <small>Control Center</small>
        </div>
      </div>
      <button class="admin-menu-close" type="button" data-admin-menu-close aria-label="إغلاق القائمة" title="إغلاق القائمة">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
    <nav class="mining-nav admin-mining-nav">
      <a href="/dashboard" class="{{ 'active' if active_page == 'dashboard' else '' }}">مركز التحكم</a>
      <a href="/users" class="{{ 'active' if active_page == 'users' else '' }}">إدارة المستخدمين</a>
      <a href="/records" class="{{ 'active' if active_page == 'records' else '' }}">سجل العمليات</a>
      <a href="/settings" class="{{ 'active' if active_page == 'settings' else '' }}">إعدادات المنصة</a>
    </nav>
    <form method="post" action="/logout">
      <button class="mining-ghost-button" type="submit">تسجيل الخروج</button>
    </form>
  </aside>

  <div class="admin-mining-shell">

    <main class="admin-mining-content">
      <header class="admin-mining-topbar">
        <button class="admin-menu-button" type="button" data-admin-menu-toggle aria-label="فتح القائمة" aria-controls="adminMenu" aria-expanded="false" title="القائمة">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
        <div class="admin-page-heading">
          <p class="mining-kicker">لوحة التحكم الإدارية</p>
          <h1>{% block page_title %}{% endblock %}</h1>
          <span>إدارة المستخدمين، الأرباح، رأس المال، وسجلات المنصة.</span>
        </div>
        <div class="admin-control-cluster">
          <div class="node-status"><span></span>النظام يعمل</div>
          <div class="admin-badge mining-admin-badge">{{ admin.username }}</div>
        </div>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    (() => {
      const body = document.body;
      const menu = document.querySelector("[data-admin-menu]");
      const toggles = document.querySelectorAll("[data-admin-menu-toggle]");
      const closers = document.querySelectorAll("[data-admin-menu-close]");

      if (!menu || !toggles.length) {
        return;
      }

      const setMenuOpen = (isOpen) => {
        body.classList.toggle("admin-menu-open", isOpen);
        menu.setAttribute("aria-hidden", String(!isOpen));
        toggles.forEach((toggle) => toggle.setAttribute("aria-expanded", String(isOpen)));
      };

      toggles.forEach((toggle) => {
        toggle.addEventListener("click", () => {
          setMenuOpen(!body.classList.contains("admin-menu-open"));
        });
      });

      closers.forEach((closer) => {
        closer.addEventListener("click", () => setMenuOpen(false));
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setMenuOpen(false);
        }
      });
    })();
  </script>
</body>
</html>
