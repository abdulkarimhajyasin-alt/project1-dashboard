<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Web Dashboard" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">Web Dashboard</div>
      <nav class="nav">
        <a href="/dashboard" class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
        <a href="/users" class="{{ 'active' if active_page == 'users' else '' }}">Users</a>
        <a href="/records" class="{{ 'active' if active_page == 'records' else '' }}">Records</a>
        <a href="/settings" class="{{ 'active' if active_page == 'settings' else '' }}">Settings</a>
      </nav>
      <form method="post" action="/logout">
        <button class="ghost-button" type="submit">Logout</button>
      </form>
    </aside>
    <main class="content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Admin Panel</p>
          <h1>{% block page_title %}{% endblock %}</h1>
        </div>
        <div class="admin-badge">{{ admin.username }}</div>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
