<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ platform_name|default("NovaHash") }} Admin Login</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/icons/favicon.svg') }}?v=novahash-2">
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="login-page">
  <main class="login-panel">
    <div class="brand-lockup auth-brand-lockup">
      <span class="brand-mark brand-mark-nova">N</span>
      <div>
        <strong>{{ platform_name|default("NovaHash") }}</strong>
        <small>{{ platform_tagline|default("Daily Mining Network") }}</small>
      </div>
    </div>
    <h1>Admin Login</h1>
    <p>Sign in to manage {{ platform_name|default("NovaHash") }}.</p>
    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="form-stack">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
