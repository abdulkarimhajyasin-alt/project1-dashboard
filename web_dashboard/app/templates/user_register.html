<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ platform_name|default("NovaHash") }} - إنشاء حساب</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/icons/favicon.svg') }}?v=novahash-2">
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="user-auth-page">
  <main class="auth-card wide-auth-card">
    <div class="brand-lockup auth-brand-lockup">
      <span class="brand-mark brand-mark-nova">N</span>
      <div>
        <strong>{{ platform_name|default("NovaHash") }}</strong>
        <small>{{ platform_tagline|default("Daily Mining Network") }}</small>
      </div>
    </div>
    <p class="auth-kicker">ابدأ رحلتك</p>
    <h1>إنشاء حساب على {{ platform_name|default("NovaHash") }}</h1>
    <p>أنشئ حسابك وابدأ دورة الأرباح اليومية الأولى داخل شبكة التعدين.</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/user/register" class="form-stack">
      <input type="hidden" name="ref" value="{{ ref }}">
      <label>اسم المستخدم<input type="text" name="username" autocomplete="username" required></label>
      <label>كلمة المرور<input type="password" name="password" autocomplete="new-password" required></label>
      <label>تأكيد كلمة المرور<input type="password" name="confirm_password" autocomplete="new-password" required></label>
      <label>
        مكان الإقامة
        <select name="residence_country" required>
          <option value="">اختر مكان الإقامة</option>
          {% for country, timezone in countries %}
          <option value="{{ country }}" {{ "selected" if selected_country == country else "" }}>{{ country }}</option>
          {% endfor %}
        </select>
      </label>
      <button type="submit">إنشاء الحساب</button>
    </form>
    <a class="auth-link" href="/user/login">لدي حساب بالفعل</a>
  </main>
</body>
</html>
