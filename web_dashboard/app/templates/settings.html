{% extends "base.html" %}

{% block page_title %}Settings{% endblock %}

{% block content %}
<section class="panel narrow-panel">
  <div class="panel-header">
    <h2>General Settings</h2>
  </div>
  <form method="post" action="/settings" class="form-stack">
    <label>
      Site name
      <input type="text" name="site_name" value="{{ settings.site_name }}">
    </label>
    <label>
      Support email
      <input type="email" name="support_email" value="{{ settings.support_email }}">
    </label>
    <label>
      Maintenance mode
      <select name="maintenance_mode">
        <option value="off" {{ "selected" if settings.maintenance_mode == "off" else "" }}>Off</option>
        <option value="on" {{ "selected" if settings.maintenance_mode == "on" else "" }}>On</option>
      </select>
    </label>
    <button type="submit">Save settings</button>
  </form>
</section>
{% endblock %}
